name: Whitman PR Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    defaults:
      run:
        working-directory: _cli-tools/whitman

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install 1.96.0 --component rustfmt --component clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: _cli-tools/whitman -> target

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-targets --all-features
